<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>청첩장 자유 편집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
:root{
  --bg:#211E1B;--surface:#2A2622;--surface2:#36312C;--line:#46403A;
  --ink:#ECE6DC;--dim:#A39A8D;--faint:#766E64;
  --thread:#B14A3C;--thread-soft:rgba(177,74,60,.16);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Gowun Dodum','Noto Sans KR',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--line);flex:0 0 auto;flex-wrap:wrap}
.toolbar .seal{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--thread);display:grid;place-items:center;color:var(--thread);font-size:11px;flex:0 0 auto}
.toolbar .ttl{font-size:13px;font-weight:700;margin-right:4px}
.tbtn{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:7px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tbtn:hover{border-color:var(--thread)}
.tbtn.primary{background:var(--thread);border-color:var(--thread);color:#fff;font-weight:700}
.tbtn:disabled{opacity:.4;cursor:default}
.sep{width:1px;height:20px;background:var(--line);margin:0 1px;flex:0 0 auto}
.savebadge{margin-left:auto;font-size:11px;color:var(--thread);background:var(--thread-soft);padding:4px 10px;border-radius:999px;white-space:nowrap}
.savebadge.warn{color:#E0A24A;background:rgba(224,162,74,.14)}
.main{flex:1;display:flex;min-height:0}
.stage{flex:1;overflow:auto;position:relative;
  background:radial-gradient(120% 80% at 50% -10%,rgba(177,74,60,.07),transparent 60%),var(--bg);
  display:flex;flex-direction:column;align-items:center;gap:22px;padding:30px 20px 120px}
.stage::before{content:"";position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:22px 22px;pointer-events:none}
#pages{position:relative;display:flex;flex-direction:column;gap:22px;z-index:1}
.card{position:relative;border-radius:6px;box-shadow:0 24px 60px -24px rgba(0,0,0,.65);overflow:hidden;touch-action:none;user-select:none}
.card-tag{position:absolute;top:-20px;left:0;font-size:11px;color:var(--faint);pointer-events:none}
.obj{position:absolute;cursor:move;touch-action:none}
.obj.locked{cursor:default}
.sel-layer{position:absolute;inset:0;pointer-events:none;z-index:9999}
.sel-outline{position:absolute;border:1.5px solid var(--thread);pointer-events:none}
.sel-outline.multi{border-style:dashed}
.handle{position:absolute;width:11px;height:11px;background:#fff;border:1.5px solid var(--thread);border-radius:2px;pointer-events:auto;z-index:2}
.handle.nw{cursor:nwse-resize}.handle.ne{cursor:nesw-resize}.handle.sw{cursor:nesw-resize}.handle.se{cursor:nwse-resize}
.handle.n{cursor:ns-resize}.handle.s{cursor:ns-resize}.handle.e{cursor:ew-resize}.handle.w{cursor:ew-resize}
.marquee{position:absolute;border:1px solid var(--thread);background:rgba(177,74,60,.12);pointer-events:none;z-index:9998}
.inspector{width:300px;flex:0 0 300px;background:var(--surface);border-left:1px solid var(--line);overflow-y:auto;padding:16px 16px 60px}
.inspector::-webkit-scrollbar{width:9px}.inspector::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
.insp-title{font-size:13px;font-weight:700;letter-spacing:.01em;margin-bottom:4px}
.insp-sub{font-size:11.5px;color:var(--dim);margin-bottom:14px}
.fld{margin-top:12px}
.fld .lab{display:block;font-size:11px;color:var(--dim);margin-bottom:5px}
.in,select.in,textarea.in{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
.in:focus,textarea.in:focus,select.in:focus{border-color:var(--thread)}
textarea.in{resize:vertical;min-height:66px;line-height:1.6}
.row{display:flex;gap:8px;align-items:center}
.row>*{flex:1;min-width:0}
.btns{display:flex;flex-wrap:wrap;gap:5px}
.mini{border:1px solid var(--line);background:var(--bg);color:var(--dim);border-radius:7px;padding:6px 9px;font-size:12px;flex:0 0 auto}
.mini:hover{color:var(--ink)}
.mini.on{background:var(--thread);border-color:var(--thread);color:#fff}
.mini.full{flex:1}
.colorwrap{display:flex;align-items:center;gap:8px}
.colorwrap input[type=color]{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;background:none;padding:2px;flex:0 0 auto;cursor:pointer}
.colorwrap .hex{font-size:12px;color:var(--dim)}
.danger{border-color:rgba(177,74,60,.5);color:#d98379}
.danger:hover{background:var(--thread);color:#fff}
.hint{font-size:11px;color:var(--faint);line-height:1.6;margin-top:12px}
.file{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1px dashed var(--line);background:var(--bg);color:var(--dim);border-radius:9px;padding:10px;font-size:12px;cursor:pointer}
.file:hover{border-color:var(--thread);color:var(--ink)}
.sld-wrap{display:flex;align-items:center;gap:8px}
.sld-wrap input[type=range]{flex:1;accent-color:var(--thread)}
.sld-wrap .val{font-size:11px;color:var(--dim);width:32px;text-align:right;flex:0 0 auto}
/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:10000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px;width:min(680px,95vw);max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:14px;font-weight:700;margin:0 0 14px}
.modal-x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--dim);font-size:17px;cursor:pointer;padding:4px 6px}
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.tmpl-card{border:2px solid var(--line);border-radius:8px;overflow:hidden;cursor:pointer}
.tmpl-card:hover{border-color:var(--thread)}
.tmpl-prev{height:160px;overflow:hidden;position:relative}
.tmpl-lbl{font-size:12px;padding:7px;text-align:center;border-top:1px solid var(--line)}
.deco-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.deco-item{border:1px solid var(--line);border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;aspect-ratio:1}
.deco-item:hover{border-color:var(--thread);background:var(--surface2)}
/* phone */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px}
.phone-frame{width:375px;background:#111;border-radius:44px;padding:10px;box-shadow:0 0 0 1px #333,0 30px 80px rgba(0,0,0,.6)}
.phone-screen{background:#fff;border-radius:36px;overflow:hidden;height:70vh;position:relative}
.phone-inner{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.phone-notch{width:110px;height:28px;background:#111;border-radius:0 0 16px 16px;margin:0 auto 4px;display:block}
/* anim text editor preview */
@keyframes _edTyping{from{width:0}to{width:100%}}
@keyframes _edBlink{0%,100%{border-color:currentColor}50%{border-color:transparent}}
@keyframes _edFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes _edWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes _edBounce{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes _edSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes _edGlitch{0%,100%{text-shadow:none}25%{text-shadow:2px 0 #f00,-2px 0 #0ff}75%{text-shadow:-2px 0 #f00,2px 0 #0ff}}
@keyframes _edHL{from{background-size:0% 40%}to{background-size:100% 40%}}
@keyframes _edHW{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
.aet-typing .aet-inner{display:inline-block;overflow:hidden;white-space:nowrap;border-right:2px solid;animation:_edTyping 2s steps(30) forwards,_edBlink .5s step-end infinite}
.aet-handwrite .aet-inner{display:inline-block;animation:_edHW 1.8s ease-out forwards}
.aet-fadein .aet-ch{display:inline-block;animation:_edFadeIn .4s both}
.aet-wave .aet-ch{display:inline-block;animation:_edWave 1s ease-in-out infinite}
.aet-bounce .aet-ch{display:inline-block;animation:_edBounce .5s both}
.aet-slideup .aet-ch{display:inline-block;animation:_edSlideUp .4s both}
.aet-glitch .aet-inner{display:inline-block;animation:_edGlitch 1.5s infinite}
.aet-highlight .aet-inner{background:linear-gradient(currentColor,currentColor) no-repeat left center/0% 40%;background-blend-mode:multiply;animation:_edHL 1.5s .3s forwards}
@media(max-width:820px){
  .main{flex-direction:column}
  .inspector{width:100%;flex:0 0 auto;max-height:42vh;border-left:none;border-top:1px solid var(--line)}
}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="seal">囍</div><span class="ttl">자유 편집기</span>
    <button class="tbtn" id="addText">＋텍스트</button>
    <button class="tbtn" id="addAnimText">✦애니텍스트</button>
    <button class="tbtn" id="addImage">＋이미지</button>
    <button class="tbtn" id="addShape">＋도형</button>
    <button class="tbtn" id="addLine">―구분선</button>
    <button class="tbtn" id="addDeco">✿장식</button>
    <button class="tbtn" id="addMap">📍지도</button>
    <button class="tbtn" id="addCal">📅달력</button>
    <button class="tbtn" id="addDday">⏳디데이</button>
    <button class="tbtn" id="addTimer">⏱️카운터</button>
    <button class="tbtn" id="addGallery">🖼️갤러리</button>
    <button class="tbtn" id="addTimeline">🗒️타임라인</button>
    <button class="tbtn" id="addAccount">💳계좌</button>
    <button class="tbtn" id="addTabs">📑탭</button>
    <button class="tbtn" id="addRsvp">✅참석</button>
    <button class="tbtn" id="addGuest">📖방명록</button>
    <span class="sep"></span>
    <button class="tbtn" id="addCard">＋카드</button>
    <span class="sep"></span>
    <button class="tbtn" id="undoBtn">↶되돌리기</button>
    <button class="tbtn" id="dupBtn">⧉복제</button>
    <span class="sep"></span>
    <button class="tbtn" id="templateBtn">🎨템플릿</button>
    <button class="tbtn" id="previewBtn">📱미리보기</button>
    <button class="tbtn primary" id="exportBtn">청첩장 내려받기</button>
    <button class="tbtn" id="resetBtn">초기화</button>
    <div class="savebadge" id="saveStatus"></div>
  </div>
  <div class="main">
    <div class="stage" id="stage"><div id="pages"></div></div>
    <aside class="inspector" id="inspector"></aside>
  </div>
</div>

<!-- template modal -->
<div class="modal-bg" id="tmplModal" style="display:none">
  <div class="modal">
    <button class="modal-x" id="tmplClose">✕</button>
    <h2>🎨 템플릿 선택</h2>
    <div class="tmpl-grid" id="tmplGrid"></div>
  </div>
</div>

<!-- preview modal -->
<div class="modal-bg" id="previewModal" style="display:none">
  <div class="phone-wrap">
    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:13px;color:var(--ink)">📱 모바일 미리보기</span>
      <button class="tbtn" id="previewClose">닫기</button>
    </div>
    <div class="phone-frame">
      <span class="phone-notch"></span>
      <div class="phone-screen"><div class="phone-inner" id="phoneInner"></div></div>
    </div>
  </div>
</div>

<!-- deco modal -->
<div class="modal-bg" id="decoModal" style="display:none">
  <div class="modal" style="width:min(360px,95vw)">
    <button class="modal-x" id="decoClose">✕</button>
    <h2>✿ 장식 선택</h2>
    <div class="deco-grid" id="decoGrid"></div>
  </div>
</div>

<input type="file" id="filePick" accept="image/*" hidden>

<script>
/* ===== 글꼴 ===== */
const FONTS=[
  {label:'나눔명조',query:'Nanum+Myeongjo:wght@400;700;800',css:"'Nanum Myeongjo',serif"},
  {label:'고운바탕',query:'Gowun+Batang:wght@400;700',css:"'Gowun Batang',serif"},
  {label:'송명',query:'Song+Myung',css:"'Song Myung',serif"},
  {label:'함렛',query:'Hahmlet:wght@300;400;600',css:"'Hahmlet',serif"},
  {label:'개구(손글씨)',query:'Gaegu:wght@400;700',css:"'Gaegu',cursive"},
  {label:'나눔펜(필기)',query:'Nanum+Pen+Script',css:"'Nanum Pen Script',cursive"},
  {label:'검은고딕',query:'Black+Han+Sans',css:"'Black Han Sans',sans-serif"},
  {label:'고운돋움',query:'Gowun+Dodum',css:"'Gowun Dodum',sans-serif"},
  {label:'본고딕',query:'Noto+Sans+KR:wght@300;400;500;700',css:"'Noto Sans KR',sans-serif"},
  {label:'본명조',query:'Noto+Serif+KR:wght@300;400;600',css:"'Noto Serif KR',serif"},
  {label:'코모란트(영문)',query:'Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400',css:"'Cormorant Garamond',serif"},
];
function buildFontLink(){
  const seen=new Set(),f=[];
  FONTS.forEach(x=>{if(!seen.has(x.query)){seen.add(x.query);f.push('family='+x.query);}});
  return 'https://fonts.googleapis.com/css2?'+f.join('&')+'&display=swap';
}

/* ===== SVG 장식 ===== */
const DECOS={
  heart:{vb:'0 0 100 90',body:`<path d="M50 85C20 60 5 45 5 28 5 14 16 5 30 5c8 0 16 5 20 13C54 10 62 5 70 5c14 0 25 9 25 23 0 17-15 32-45 57z"/>`},
  flower:{vb:'0 0 100 100',body:`<circle cx="50" cy="18" r="13"/><circle cx="50" cy="82" r="13"/><circle cx="18" cy="50" r="13"/><circle cx="82" cy="50" r="13"/><circle cx="28" cy="28" r="13"/><circle cx="72" cy="28" r="13"/><circle cx="28" cy="72" r="13"/><circle cx="72" cy="72" r="13"/><circle cx="50" cy="50" r="17" fill="white"/><circle cx="50" cy="50" r="9"/>`},
  leaf:{vb:'0 0 60 100',body:`<path d="M30 5Q58 30 58 65Q44 90 30 95Q16 90 2 65Q2 30 30 5Z"/><line x1="30" y1="10" x2="30" y2="90" stroke="white" stroke-width="2" fill="none"/><line x1="30" y1="40" x2="50" y2="55" stroke="white" stroke-width="1.5" fill="none"/><line x1="30" y1="55" x2="10" y2="68" stroke="white" stroke-width="1.5" fill="none"/>`},
  ring:{vb:'0 0 100 60',body:`<circle cx="32" cy="30" r="22" fill="none" stroke="currentColor" stroke-width="6"/><circle cx="68" cy="30" r="22" fill="none" stroke="currentColor" stroke-width="6"/>`},
  star:{vb:'0 0 100 100',body:`<polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"/>`},
  butterfly:{vb:'0 0 100 100',body:`<path d="M50 50Q22 22 6 36Q0 60 24 66Q40 68 50 50Z"/><path d="M50 50Q78 22 94 36Q100 60 76 66Q60 68 50 50Z"/><path d="M50 50Q32 70 22 86Q42 80 50 64Z"/><path d="M50 50Q68 70 78 86Q58 80 50 64Z"/><ellipse cx="50" cy="50" rx="4" ry="6" fill="white"/>`},
  ornament:{vb:'0 0 200 40',body:`<line x1="0" y1="20" x2="72" y2="20" stroke="currentColor" stroke-width="1.5"/><line x1="128" y1="20" x2="200" y2="20" stroke="currentColor" stroke-width="1.5"/><circle cx="100" cy="20" r="7"/><circle cx="81" cy="20" r="3.5"/><circle cx="119" cy="20" r="3.5"/><path d="M88 20Q94 10 100 14Q106 10 112 20Q106 30 100 26Q94 30 88 20Z" fill="white"/>`},
  dove:{vb:'0 0 100 80',body:`<path d="M18 55Q8 36 28 32Q40 28 50 38L82 22Q92 17 90 32Q87 44 70 47L55 58Q44 68 34 63Z"/><circle cx="34" cy="36" r="2.5" fill="white"/>`},
  wreath:{vb:'0 0 100 100',body:`<path d="M50 10Q60 25 52 35Q65 28 72 38Q62 42 58 54Q68 50 74 60Q62 60 60 72Q54 62 44 64Q46 76 36 78Q38 66 28 64Q34 54 26 48Q38 50 42 40Q32 40 30 28Q40 34 50 28Q44 18 50 10Z" fill-rule="evenodd"/>`},
};

/* ===== 기본값 ===== */
const ACCENT='#B07A5B',INK='#46403A',PAPER='#FBF8F1';
const FD="'Nanum Myeongjo',serif",FB="'Gowun Dodum',sans-serif";

function mkTxt(o){return Object.assign({type:'text',text:'텍스트',font:FB,size:15,color:INK,weight:400,align:'center',valign:'center',lh:1.6,ls:0,w:300,h:40,x:40,y:40,underline:false,italic:false,opacity:100,strokeColor:'',strokeWidth:0,animation:'none'},o);}
function mkImg(o){return Object.assign({type:'image',src:null,fit:'cover',radius:0,w:160,h:160,x:110,y:110,opacity:100,brightness:100,contrast:100,grayscale:0,sepia:0},o);}
function mkShp(o){return Object.assign({type:'shape',color:ACCENT,radius:0,w:120,h:120,x:130,y:130,opacity:100,borderWidth:0,borderColor:'#000000'},o);}
function mkLine(o){return Object.assign({type:'line',color:ACCENT,thick:1,style:'solid',w:260,h:12,x:60,y:60,opacity:100},o);}
function mkDeco(o){return Object.assign({type:'deco',svgKey:'flower',color:ACCENT,w:80,h:80,x:150,y:60,opacity:100},o);}
function mkMap(o){return Object.assign({type:'map',address:'서울특별시 강남구 테헤란로 123',label:'그랜드 컨벤션',w:300,h:200,x:40,y:40},o);}
function mkAnimTxt(o){return Object.assign({type:'anim-text',text:'민준 ♥ 서연',font:FD,size:22,color:INK,weight:400,align:'center',lh:1.4,ls:1,w:300,h:50,x:40,y:40,effect:'typing',speed:1,delay:0,loop:false},o);}
function mkCal(o){return Object.assign({type:'cal',year:2026,month:10,day:18,color:'#AD9A82',ink:'#7C746B',font:FB,w:320,h:250,x:30,y:30},o);}
function mkDday(o){return Object.assign({type:'dday',date:'2026-10-18',label:'2026년 10월 18일',color:'#AD9A82',ink:'#7C746B',font:FD,size:30,w:300,h:90,x:40,y:40},o);}
function mkTimer(o){return Object.assign({type:'timer',date:'2014-05-20',label:'함께한 시간',color:'#AD9A82',ink:'#7C746B',font:FD,w:320,h:90,x:30,y:30},o);}
function mkAccount(o){return Object.assign({type:'account',title:'마음 전하실 곳',gB:'국민은행',gN:'김민준',gA:'123456-78-901234',bB:'신한은행',bN:'이서연',bA:'110-234-567890',color:'#AD9A82',ink:'#7C746B',font:FD,w:320,h:200,x:30,y:30},o);}
function mkTabs(o){return Object.assign({type:'tabs',tabs:[{t:'포토부스',b:'소중한 날을 기록할\n포토부스를 준비했어요.'},{t:'주차안내',b:'예식장 지하 주차장\n2시간 무료입니다.'},{t:'답례품',b:'정성스런 답례품을\n준비했어요.'}],active:0,color:'#AD9A82',ink:'#7C746B',font:FB,w:320,h:180,x:30,y:30},o);}
function mkRsvp(o){return Object.assign({type:'rsvp',title:'참석 여부 전달',desc:'참석 여부를 미리 알려주시면\n준비에 큰 도움이 됩니다.',btn:'참석 여부 전달하기',url:'',color:'#AD9A82',ink:'#7C746B',font:FD,w:320,h:180,x:30,y:30},o);}

/* ===== helpers ===== */
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let _id=0;const uid=()=>'o'+(Date.now().toString(36))+(_id++);

function defaultDoc(){return TEMPLATES[0].make(uid);}
let doc=defaultDoc();
let sel={card:0,ids:new Set()};
let activeCard=0;

/* ===== auto-save ===== */
const KEY='wedding-v3';
let storageOK=false;
try{localStorage.setItem('__t','1');localStorage.removeItem('__t');storageOK=true;}catch(e){}
function setStatus(m,w){const e=$('saveStatus');if(!e)return;e.textContent=m;e.classList.toggle('warn',!!w);}
let saveTimer=null;
function save(){
  if(!storageOK)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(KEY,JSON.stringify(doc));setStatus('✓ 자동 저장됨',false);}
    catch(e){
      try{const lite=JSON.parse(JSON.stringify(doc));
        lite.cards.forEach(c=>c.objects.forEach(o=>{if(o.type==='image')o.src=null;}));
        localStorage.setItem(KEY,JSON.stringify(lite));setStatus('✓ 저장됨·이미지 제외',true);
      }catch(e2){setStatus('⚠ 자동 저장 안 됨',true);}
    }
  },350);
}
function load(){
  if(!storageOK)return;
  try{const raw=localStorage.getItem(KEY);if(!raw)return;
    const d=JSON.parse(raw);
    if(d&&Array.isArray(d.cards)){
      doc=d;doc.width=doc.width||380;
      doc.cards.forEach(c=>{
        if(!c.pat)c.pat='none';if(!c.patColor)c.patColor='';
        c.objects.forEach(o=>{
          if(o.type==='text'){
            if(o.underline==null)o.underline=false;if(o.italic==null)o.italic=false;
            if(o.opacity==null)o.opacity=100;if(!o.strokeColor)o.strokeColor='';if(!o.strokeWidth)o.strokeWidth=0;
            if(!o.animation)o.animation='none';
          }
          if(o.type==='image'){if(o.opacity==null)o.opacity=100;if(o.brightness==null)o.brightness=100;if(o.contrast==null)o.contrast=100;if(o.grayscale==null)o.grayscale=0;if(o.sepia==null)o.sepia=0;}
          if(o.type==='shape'){if(o.opacity==null)o.opacity=100;if(!o.borderWidth)o.borderWidth=0;if(!o.borderColor)o.borderColor='#000000';}
        });
      });
    }
  }catch(e){}
}

/* ===== pattern ===== */
function patCSS(pat,col){
  const c=col||'rgba(0,0,0,0.07)';
  if(pat==='dots')return `background-image:radial-gradient(${c} 1.5px,transparent 1.5px);background-size:18px 18px;`;
  if(pat==='grid')return `background-image:linear-gradient(${c} 1px,transparent 1px),linear-gradient(90deg,${c} 1px,transparent 1px);background-size:24px 24px;`;
  if(pat==='diagonal')return `background-image:repeating-linear-gradient(45deg,${c} 0,${c} 1px,transparent 0,transparent 50%);background-size:14px 14px;`;
  if(pat==='cross')return `background-image:linear-gradient(${c} 1px,transparent 1px),linear-gradient(90deg,${c} 1px,transparent 1px);background-size:10px 10px;`;
  return '';
}

/* ===== objStyle ===== */
function objStyle(o){
  let s=`position:absolute;left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px;`;
  if(o.type==='text'){
    const jc=o.valign==='top'?'flex-start':o.valign==='bottom'?'flex-end':'center';
    s+=`display:flex;flex-direction:column;justify-content:${jc};`;
    s+=`font-family:${o.font};font-size:${o.size}px;color:${o.color};font-weight:${o.weight};`;
    s+=`line-height:${o.lh};letter-spacing:${o.ls}px;text-align:${o.align};`;
    s+=`white-space:pre-wrap;word-break:keep-all;overflow:visible;`;
    if(o.italic)s+=`font-style:italic;`;
    if(o.underline)s+=`text-decoration:underline;`;
    if((o.opacity??100)<100)s+=`opacity:${(o.opacity??100)/100};`;
    if(o.strokeWidth>0&&o.strokeColor)s+=`-webkit-text-stroke:${o.strokeWidth}px ${o.strokeColor};paint-order:stroke fill;`;
  }else if(o.type==='image'){
    if(o.src){s+=`background-image:url('${o.src}');background-size:${o.fit};background-position:center;background-repeat:no-repeat;`;}
    else{s+=`background:rgba(0,0,0,.07);`;}
    s+=`border-radius:${o.radius}px;`;
    const fl=[];
    if((o.brightness??100)!==100)fl.push(`brightness(${o.brightness}%)`);
    if((o.contrast??100)!==100)fl.push(`contrast(${o.contrast}%)`);
    if(o.grayscale)fl.push(`grayscale(${o.grayscale}%)`);
    if(o.sepia)fl.push(`sepia(${o.sepia}%)`);
    if(fl.length)s+=`filter:${fl.join(' ')};`;
    if((o.opacity??100)<100)s+=`opacity:${(o.opacity??100)/100};`;
  }else if(o.type==='shape'){
    s+=`background:${o.color};border-radius:${o.radius}px;`;
    if((o.opacity??100)<100)s+=`opacity:${(o.opacity??100)/100};`;
    if(o.borderWidth>0)s+=`border:${o.borderWidth}px solid ${o.borderColor};`;
  }else if(o.type==='line'){
    s+=`display:flex;align-items:center;`;
    if((o.opacity??100)<100)s+=`opacity:${(o.opacity??100)/100};`;
  }else if(o.type==='deco'){
    if((o.opacity??100)<100)s+=`opacity:${(o.opacity??100)/100};`;
  }else if(o.type==='map'){
    s+=`border-radius:8px;overflow:hidden;`;
  }else if(o.type==='anim-text'){
    const ai=o.align==='left'?'flex-start':o.align==='right'?'flex-end':'center';
    s+=`display:flex;flex-direction:column;justify-content:center;align-items:${ai};`;
    s+=`font-family:${o.font};font-size:${o.size}px;color:${o.color};font-weight:${o.weight};`;
    s+=`line-height:${o.lh};letter-spacing:${o.ls}px;text-align:${o.align};overflow:hidden;`;
  }
  return s;
}

/* ===== objInner ===== */
function animTextEditorHTML(o){
  const txt=esc(o.text);
  const spd=o.speed||1;
  const ef=o.effect||'typing';
  const cls='aet-'+ef;
  if(ef==='typing'||ef==='handwrite'||ef==='glitch'||ef==='highlight'){
    return `<span class="${cls}"><span class="aet-inner">${txt}</span></span>`;
  }
  const chars=[...o.text].map((c,i)=>{
    const d=(i*0.06*(2-Math.min(spd,1.8))).toFixed(2);
    const s=ef==='wave'?`animation-delay:${d}s;animation-duration:${(1.2/spd).toFixed(2)}s`:`animation-delay:${d}s;animation-duration:${(0.4/spd).toFixed(2)}s`;
    return `<span class="aet-ch" style="${s}">${c===' '?'&nbsp;':esc(c)}</span>`;
  }).join('');
  return `<span class="${cls}">${chars}</span>`;
}

const WD_K=['일','월','화','수','목','금','토'];
function _calHTML(o){
  const y=+o.year,m=+o.month,day=+o.day;
  const first=new Date(y,m-1,1).getDay(),tot=new Date(y,m,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push('');for(let i=1;i<=tot;i++)cells.push(i);while(cells.length%7)cells.push('');
  let rows='';
  for(let r=0;r<cells.length/7;r++){rows+='<tr>';
    for(let c=0;c<7;c++){const v=cells[r*7+c],col=c===0?'#cf8e89':o.ink;
      if(v==='')rows+='<td></td>';
      else if(v===day)rows+=`<td style="padding:6px 0"><span style="display:inline-flex;width:30px;height:30px;align-items:center;justify-content:center;border-radius:50%;background:${o.color};color:#fff">${v}</span></td>`;
      else rows+=`<td style="padding:6px 0;color:${col}">${v}</td>`;}
    rows+='</tr>';}
  const head=WD_K.map((w,i)=>`<th style="color:${i===0?'#cf8e89':o.ink};font-weight:400;font-size:12px;padding-bottom:10px">${w}</th>`).join('');
  return `<div style="width:100%;text-align:center;font-family:${o.font};color:${o.ink}"><div style="font-size:15px;color:${o.color};letter-spacing:2px;margin-bottom:14px">${o.month}월</div><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;

function _ddayStr(ds){const w=new Date(ds+'T00:00'),t=new Date();t.setHours(0,0,0,0);const d=Math.round((w-t)/864e5);return d>0?'D-'+d:d===0?'D-DAY':'D+'+(-d);}
function _timerStr(ds){const s=new Date(ds+'T00:00'),n=new Date();let yr=n.getFullYear()-s.getFullYear(),mo=n.getMonth()-s.getMonth(),dy=n.getDate()-s.getDate(),hh=n.getHours()-s.getHours(),mm=n.getMinutes()-s.getMinutes(),ss=n.getSeconds()-s.getSeconds();if(ss<0){ss+=60;mm--;}if(mm<0){mm+=60;hh--;}if(hh<0){hh+=24;dy--;}if(dy<0){dy+=new Date(n.getFullYear(),n.getMonth(),0).getDate();mo--;}if(mo<0){mo+=12;yr--;}return yr+'년 '+mo+'개월 '+dy+'일 '+hh+'시간 '+mm+'분 '+ss+'초';}
function smartInner(o,editor){

    return `<div style="width:100%;text-align:center;font-family:${o.font};color:${o.ink}"><div style="font-size:14px;color:${o.color};margin-bottom:10px">${esc(o.label)}</div><div ${editor?'':`data-timer="${o.date}"`} style="font-size:15px;letter-spacing:1px">${t}</div></div>`;}
  if(o.type==='account'){

    return `<div style="width:100%;font-family:${o.font};color:${o.ink};text-align:center"><div style="font-size:15px;color:${o.color};margin-bottom:6px">${esc(o.title)}</div>${acc('신랑측',o.gB,o.gN,o.gA)}${acc('신부측',o.bB,o.bN,o.bA)}</div>`;}
  if(o.type==='tabs'){const ac=o.color,act=o.active||0;
    const heads=o.tabs.map((tb,i)=>`<button ${editor?'':`data-ti="${i}"`} style="flex:1;background:none;border:none;border-bottom:2px solid ${i===act?ac:'transparent'};padding:8px 4px;font-family:${o.font};font-size:13px;color:${o.ink};opacity:${i===act?1:.5};cursor:pointer">${esc(tb.t)}</button>`).join('');

    return `<div ${editor?'':`data-tabsroot data-ac="${ac}"`} style="width:100%;font-family:${o.font}"><div style="display:flex;border-bottom:1px solid ${ac}33">${heads}</div>${panels}</div>`;}
  if(o.type==='rsvp'||o.type==='guest'){
    const btn=editor?`<span style="display:inline-block;background:${o.color};color:#fff;border-radius:8px;padding:11px 26px;font-size:13px">${esc(o.btn)}</span>`:`<a href="${o.url||'#'}" target="_blank" rel="noopener" style="display:inline-block;background:${o.color};color:#fff;border-radius:8px;padding:11px 26px;font-size:13px;text-decoration:none">${esc(o.btn)}</a>`;
    return `<div style="width:100%;text-align:center;font-family:${o.font};color:${o.ink}"><div style="font-size:16px;color:${o.color};margin-bottom:12px">${esc(o.title)}</div><div style="font-size:13px;white-space:pre-wrap;line-height:1.7;margin-bottom:18px;opacity:.9">${esc(o.desc)}</div>${btn}</div>`;}
  if(o.type==='gallery'){const imgs=o.images&&o.images.length?o.images:null;
    let grid;
    if(imgs)grid=imgs.map(s=>`<div style="aspect-ratio:1;background-image:url('${s}');background-size:cover;background-position:center;border-radius:${o.radius}px"></div>`).join('');
    else grid=[0,1,2,3,4,5].map(()=>`<div style="aspect-ratio:1;background:rgba(0,0,0,.05);border-radius:${o.radius}px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:11px">사진</div>`).join('');
    return `<div style="width:100%;font-family:${o.font};color:${o.ink};text-align:center"><div style="font-size:15px;color:${o.color};margin-bottom:14px">${esc(o.title)}</div><div style="display:grid;grid-template-columns:repeat(${o.cols},1fr);gap:${o.gap}px">${grid}</div></div>`;}
  if(o.type==='timeline'){const items=o.items||[];

      return `<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;${left?'':'flex-direction:row-reverse;text-align:right'}"><div style="flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:${o.color};margin-top:6px"></div><div style="flex:1"><div style="font-size:13px;color:${o.color}">${esc(it.t)}</div><div style="font-size:12px;opacity:.85;line-height:1.6">${esc(it.s)}</div><div style="font-size:11px;opacity:.5;margin-top:3px">${esc(it.d)}</div></div></div>`;}).join('');
    return `<div style="width:100%;font-family:${o.font};color:${o.ink};text-align:center"><div style="font-size:15px;color:${o.color};margin-bottom:18px">${esc(o.title)}</div><div style="text-align:left">${rows}</div></div>`;}
  return null;
}
function objInner(o,editor){
  if(o.type==='text')return `<div style="width:100%;text-align:${o.align}">${esc(o.text)}</div>`;
  if(o.type==='image'&&!o.src)return editor?`<div style="margin:auto;color:#aaa;font-size:11px;text-align:center">이미지 없음</div>`:'';
  if(o.type==='line'){
    const st=o.style==='dashed'?`border-top:${o.thick}px dashed ${o.color};height:0`:o.style==='dotted'?`border-top:${o.thick}px dotted ${o.color};height:0`:`height:${o.thick}px;background:${o.color}`;
    return `<div style="width:100%;${st}"></div>`;
  }
  if(o.type==='deco')return decoSVG(o.svgKey,o.color,o.w,o.h);
  if(o.type==='map'){
    if(editor)return `<div style="width:100%;height:100%;background:#dde8d8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px"><div style="font-size:22px">📍</div><div style="font-size:11px;color:#555;text-align:center;padding:0 10px">${esc(o.label||o.address)}</div></div>`;
    const q=encodeURIComponent(o.address);
    return `<iframe src="https://maps.google.com/maps?q=${q}&output=embed" width="100%" height="100%" style="border:0" allowfullscreen loading="lazy"></iframe>`;
  }
  if(o.type==='anim-text')return editor?animTextEditorHTML(o):esc(o.text);
  {const _si=smartInner(o,editor);if(_si!==null)return _si;}
  return '';
}

/* ===== render ===== */
function cardBg(c){
  let s=`width:${doc.width}px;height:${c.h}px;background:${c.bg};`;
  if(c.pat&&c.pat!=='none')s+=patCSS(c.pat,c.patColor);
  return s;
}
function renderCards(){
  const pages=$('pages');
  pages.style.width=doc.width+'px';
  pages.innerHTML=doc.cards.map((c,ci)=>{
    const objs=c.objects.map(o=>`<div class="obj${o.lock?' locked':''}" data-id="${o.id}" data-card="${ci}" style="${objStyle(o)}">${objInner(o,true)}</div>`).join('');
    return `<div class="card" data-card="${ci}" style="${cardBg(c)}"><div class="card-tag">카드 ${ci+1}</div>${objs}<div class="sel-layer" data-card="${ci}"></div></div>`;
  }).join('');
  renderSelection();
}
const getCardEl=ci=>$('pages').querySelector(`.card[data-card="${ci}"]`);
const getObjEl=id=>$('pages').querySelector(`.obj[data-id="${id}"]`);
function findObj(id){for(const c of doc.cards){const o=c.objects.find(o=>o.id===id);if(o)return o;}return null;}

function renderSelection(){
  document.querySelectorAll('.sel-layer').forEach(l=>l.innerHTML='');
  if(!sel.ids.size)return;
  const layer=getCardEl(sel.card)?.querySelector('.sel-layer');
  if(!layer)return;
  const ids=[...sel.ids];
  ids.forEach(id=>{
    const o=findObj(id);if(!o)return;
    const d=document.createElement('div');d.className='sel-outline'+(ids.length>1?' multi':'');
    d.style.cssText=`left:${o.x}px;top:${o.y}px;width:${o.w}px;height:${o.h}px`;layer.appendChild(d);
  });
  if(ids.length===1){
    const o=findObj(ids[0]);
    ['nw','n','ne','e','se','s','sw','w'].forEach(d=>{
      const h=document.createElement('div');h.className='handle '+d;h.dataset.dir=d;h.dataset.id=o.id;
      const px=d.includes('w')?o.x:d.includes('e')?o.x+o.w:o.x+o.w/2;
      const py=d.includes('n')?o.y:d.includes('s')?o.y+o.h:o.y+o.h/2;
      h.style.left=(px-5.5)+'px';h.style.top=(py-5.5)+'px';layer.appendChild(h);
    });
  }
}

/* ===== selection ===== */
function selectOne(id,ci,additive){
  if(sel.card!==ci)sel={card:ci,ids:new Set()};
  const o=findObj(id);
  const gids=o&&o.groupId?doc.cards[ci].objects.filter(x=>x.groupId===o.groupId).map(x=>x.id):[id];
  if(additive){const has=sel.ids.has(id);gids.forEach(g=>has?sel.ids.delete(g):sel.ids.add(g));}
  else{if(!sel.ids.has(id))sel.ids=new Set(gids);}
  activeCard=ci;renderSelection();renderInspector();
}
function clearSel(){sel.ids=new Set();renderSelection();renderInspector();}

/* ===== pointer ===== */
let drag=null;
$('pages').addEventListener('pointerdown',e=>{
  const handle=e.target.closest('.handle');
  const objEl=e.target.closest('.obj');
  const cardEl=e.target.closest('.card');
  if(!cardEl)return;
  const ci=+cardEl.dataset.card;activeCard=ci;
  if(handle){
    e.preventDefault();
    const o=findObj(handle.dataset.id);
    drag={mode:'resize',dir:handle.dataset.dir,id:o.id,sx:e.clientX,sy:e.clientY,ox:o.x,oy:o.y,ow:o.w,oh:o.h,snap:snapshot(),moved:false};
    document.body.setPointerCapture?.(e.pointerId);return;
  }
  if(objEl){
    e.preventDefault();
    const id=objEl.dataset.id;selectOne(id,ci,e.shiftKey);
    if(!sel.ids.has(id))return;
    const items=[...sel.ids].map(i=>{const o=findObj(i);return{id:i,ox:o.x,oy:o.y};});
    drag={mode:'move',items,sx:e.clientX,sy:e.clientY,snap:snapshot(),moved:false};return;
  }
  if(!e.shiftKey)clearSel();
  const r=cardEl.getBoundingClientRect();
  const mq=document.createElement('div');mq.className='marquee';cardEl.appendChild(mq);
  drag={mode:'marquee',card:ci,rect:r,sx:e.clientX-r.left,sy:e.clientY-r.top,el:mq};
});
window.addEventListener('pointermove',e=>{
  if(!drag)return;
  if(drag.mode==='move'){
    const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
    if(dx||dy)drag.moved=true;
    drag.items.forEach(it=>{const o=findObj(it.id);o.x=Math.round(it.ox+dx);o.y=Math.round(it.oy+dy);
      const el=getObjEl(it.id);if(el){el.style.left=o.x+'px';el.style.top=o.y+'px';}});
    renderSelection();
  }else if(drag.mode==='resize'){
    const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy,o=findObj(drag.id),d=drag.dir;
    if(dx||dy)drag.moved=true;
    let x=drag.ox,y=drag.oy,w=drag.ow,h=drag.oh;
    if(d.includes('e'))w=Math.max(16,drag.ow+dx);
    if(d.includes('s'))h=Math.max(16,drag.oh+dy);
    if(d.includes('w')){w=Math.max(16,drag.ow-dx);x=drag.ox+(drag.ow-w);}
    if(d.includes('n')){h=Math.max(16,drag.oh-dy);y=drag.oy+(drag.oh-h);}
    o.x=Math.round(x);o.y=Math.round(y);o.w=Math.round(w);o.h=Math.round(h);
    const el=getObjEl(o.id);if(el){el.style.left=o.x+'px';el.style.top=o.y+'px';el.style.width=o.w+'px';el.style.height=o.h+'px';}
    renderSelection();
  }else if(drag.mode==='marquee'){
    const cx=e.clientX-drag.rect.left,cy=e.clientY-drag.rect.top;
    const x=Math.min(cx,drag.sx),y=Math.min(cy,drag.sy),w=Math.abs(cx-drag.sx),h=Math.abs(cy-drag.sy);
    drag.el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;drag.box={x,y,w,h};
  }
});
window.addEventListener('pointerup',()=>{
  if(!drag)return;
  if(drag.mode==='marquee'){
    drag.el.remove();
    if(drag.box&&(drag.box.w>4||drag.box.h>4)){
      const b=drag.box,ids=new Set(sel.card===drag.card?[...sel.ids]:[]);
      doc.cards[drag.card].objects.forEach(o=>{if(o.x<b.x+b.w&&o.x+o.w>b.x&&o.y<b.y+b.h&&o.y+o.h>b.y)ids.add(o.id);});
      sel={card:drag.card,ids};renderSelection();renderInspector();
    }
  }else if(drag.moved){pushUndo(drag.snap);save();}
  drag=null;
});

function eachSel(fn){[...sel.ids].map(findObj).filter(Boolean).forEach(fn);}
function repaint(){eachSel(o=>{const el=getObjEl(o.id);if(el){el.style.cssText=objStyle(o);el.innerHTML=objInner(o,true);}});renderSelection();}

function bindSld(id,set){
  const el=$(id),vEl=$(id+'V');if(!el)return;
  el.addEventListener('mousedown',()=>pushUndo(snapshot()));
  el.oninput=e=>{set(+e.target.value);if(vEl)vEl.textContent=e.target.value;repaint();save();};
}
function bindCol(id,set){
  const el=$(id);if(!el)return;
  el.oninput=e=>{set(e.target.value);if(el.nextElementSibling)el.nextElementSibling.textContent=e.target.value;repaint();save();};
  el.onchange=()=>pushUndo(snapshot());
}

function bindInsp(objs,multi){
  const o0=objs[0];
  const cm=()=>pushUndo(snapshot());

  /* text */
  if($('pTxt')){$('pTxt').oninput=e=>{o0.text=e.target.value;repaint();save();};$('pTxt').addEventListener('focus',cm,{once:true});}
  if($('pFont'))$('pFont').onchange=e=>{cm();eachSel(o=>o.font=e.target.value);repaint();save();};
  if($('pSz'))$('pSz').onchange=e=>{cm();const v=+e.target.value;if(v)eachSel(o=>o.size=v);repaint();save();};
  if($('pLh'))$('pLh').onchange=e=>{cm();const v=+e.target.value;if(v)eachSel(o=>o.lh=v);repaint();save();};
  bindCol('pCol',v=>eachSel(o=>o.color=v));
  bindCol('pSCol',v=>eachSel(o=>o.strokeColor=v));
  if($('pSW'))$('pSW').onchange=e=>{cm();eachSel(o=>o.strokeWidth=+e.target.value||0);repaint();save();};
  if($('pItl'))$('pItl').onclick=()=>{cm();const v=!o0.italic;eachSel(o=>o.italic=v);renderInspector();repaint();save();};
  if($('pUnl'))$('pUnl').onclick=()=>{cm();const v=!o0.underline;eachSel(o=>o.underline=v);renderInspector();repaint();save();};
  bindSld('pOp',v=>eachSel(o=>o.opacity=v));
  if($('pAnim'))$('pAnim').onchange=e=>{cm();eachSel(o=>o.animation=e.target.value);save();};
  document.querySelectorAll('[data-al]').forEach(b=>b.onclick=()=>{cm();eachSel(o=>o.align=b.dataset.al);repaint();save();});
  document.querySelectorAll('[data-wt]').forEach(b=>b.onclick=()=>{cm();eachSel(o=>o.weight=+b.dataset.wt);repaint();save();});

  /* anim-text */
  if($('atTxt')){$('atTxt').oninput=e=>{o0.text=e.target.value;repaint();save();};$('atTxt').addEventListener('focus',cm,{once:true});}
  if($('atFont'))$('atFont').onchange=e=>{cm();o0.font=e.target.value;repaint();save();};
  if($('atSz'))$('atSz').onchange=e=>{cm();o0.size=+e.target.value||16;repaint();save();};
  if($('atWt'))$('atWt').onchange=e=>{cm();o0.weight=+e.target.value||400;repaint();save();};
  bindCol('atCol',v=>{o0.color=v;});
  if($('atEff'))$('atEff').onchange=e=>{cm();o0.effect=e.target.value;repaint();save();};
  bindSld('atSpd',v=>o0.speed=v);
  bindSld('atDly',v=>o0.delay=v);
  if($('atLoop'))$('atLoop').onclick=()=>{cm();o0.loop=!o0.loop;renderInspector();repaint();save();};
  document.querySelectorAll('[data-atal]').forEach(b=>b.onclick=()=>{cm();o0.align=b.dataset.atal;repaint();save();});

  /* image */
  if($('pRepl'))$('pRepl').onclick=()=>pickImage(o0);
  if($('pRad'))$('pRad').onchange=e=>{cm();o0.radius=+e.target.value||0;repaint();save();};
  bindSld('iOp',v=>o0.opacity=v);bindSld('iBr',v=>o0.brightness=v);bindSld('iCo',v=>o0.contrast=v);bindSld('iGr',v=>o0.grayscale=v);bindSld('iSp',v=>o0.sepia=v);
  document.querySelectorAll('[data-fit]').forEach(b=>b.onclick=()=>{cm();o0.fit=b.dataset.fit;repaint();save();});

  /* shape */
  bindCol('sCol',v=>o0.color=v);
  if($('sRad'))$('sRad').onchange=e=>{cm();o0.radius=+e.target.value||0;repaint();save();};
  bindSld('sOp',v=>o0.opacity=v);
  if($('sBW'))$('sBW').onchange=e=>{cm();o0.borderWidth=+e.target.value||0;repaint();save();};
  bindCol('sBC',v=>o0.borderColor=v);

  /* line */
  bindCol('lCol',v=>o0.color=v);
  if($('lTk'))$('lTk').onchange=e=>{cm();o0.thick=+e.target.value||1;repaint();save();};
  if($('lSt'))$('lSt').onchange=e=>{cm();o0.style=e.target.value;repaint();save();};
  bindSld('lOp',v=>o0.opacity=v);

  /* deco */
  if($('decoChg'))$('decoChg').onclick=()=>openDecoModal(o0);
  bindCol('dCol',v=>o0.color=v);
  bindSld('dOp',v=>o0.opacity=v);

  /* map */
  if($('mLbl'))$('mLbl').onchange=e=>{cm();o0.label=e.target.value;repaint();save();};
  if($('mAddr'))$('mAddr').onchange=e=>{cm();o0.address=e.target.value;repaint();save();};

  /* common */
  /* smart-block bindings */
  function _bN(id,set){const el=$(id);if(el)el.onchange=e=>{cm();set(+e.target.value);repaint();renderInspector();save();};}

function alignCard(pos){
  const W=doc.width,H=doc.cards[sel.card].h;
  eachSel(o=>{
    if(pos==='left')o.x=0;else if(pos==='right')o.x=W-o.w;else if(pos==='cx')o.x=Math.round((W-o.w)/2);

function dupSel(){
  if(!sel.ids.size)return;pushUndo(snapshot());
  const c=doc.cards[sel.card],ni=[];
  [...sel.ids].map(findObj).filter(Boolean).forEach(o=>{const n=JSON.parse(JSON.stringify(o));n.id=uid();n.x+=14;n.y+=14;n.groupId=null;c.objects.push(n);ni.push(n.id);});

/* ===== keyboard ===== */
window.addEventListener('keydown',e=>{
  const t=e.target.tagName;if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;
  const meta=e.ctrlKey||e.metaKey;
  if(meta&&e.key.toLowerCase()==='z'){e.preventDefault();doUndo();return;}
  if(meta&&e.key.toLowerCase()==='d'){e.preventDefault();dupSel();return;}
  if(e.key==='Escape'){clearSel();return;}
  if(!sel.ids.size)return;
  if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();delSel();return;}
  const step=e.shiftKey?10:1;let mv=false;
  if(e.key==='ArrowLeft'){eachSel(o=>o.x-=step);mv=true;}
  if(e.key==='ArrowRight'){eachSel(o=>o.x+=step);mv=true;}
  if(e.key==='ArrowUp'){eachSel(o=>o.y-=step);mv=true;}
  if(e.key==='ArrowDown'){eachSel(o=>o.y+=step);mv=true;}
  if(mv){e.preventDefault();eachSel(o=>{const el=getObjEl(o.id);if(el){el.style.left=o.x+'px';el.style.top=o.y+'px';}});renderSelection();save();}
});

  function tk(){document.querySelectorAll('[data-timer]').forEach(function(el){var s=new Date(el.getAttribute('data-timer')+'T00:00'),n=new Date();var yr=n.getFullYear()-s.getFullYear(),mo=n.getMonth()-s.getMonth(),dy=n.getDate()-s.getDate(),hh=n.getHours()-s.getHours(),mm=n.getMinutes()-s.getMinutes(),ss=n.getSeconds()-s.getSeconds();if(ss<0){ss+=60;mm--;}if(mm<0){mm+=60;hh--;}if(hh<0){hh+=24;dy--;}if(dy<0){dy+=new Date(n.getFullYear(),n.getMonth(),0).getDate();mo--;}if(mo<0){mo+=12;yr--;}el.textContent=yr+'년 '+mo+'개월 '+dy+'일 '+hh+'시간 '+mm+'분 '+ss+'초';});}
  tk();setInterval(tk,1000);
  document.querySelectorAll('[data-tabsroot]').forEach(function(root){root.addEventListener('click',function(e){var b=e.target.closest('[data-ti]');if(!b)return;var i=b.getAttribute('data-ti'),ac=root.getAttribute('data-ac')||'#AD9A82';root.querySelectorAll('[data-ti]').forEach(function(x){var on=x.getAttribute('data-ti')===i;x.style.opacity=on?'1':'.5';x.style.borderBottomColor=on?ac:'transparent';});root.querySelectorAll('[data-tp]').forEach(function(p){p.style.display=p.getAttribute('data-tp')===i?'block':'none';});});});
})();`;

  const cards=doc.cards.map(c=>{
    let bgSt=`position:relative;width:${doc.width}px;height:${c.h}px;background:${c.bg};overflow:hidden;`;
    if(c.pat&&c.pat!=='none')bgSt+=patCSS(c.pat,c.patColor);
    const objs=c.objects.map(o=>{
      const st=exportObjStyle(o);
      const isAT=o.type==='anim-text';
      const hasTxtAnim=o.type==='text'&&o.animation&&o.animation!=='none';
      // strip the "data-reveal" flag we hacked into the style string
      const cleanSt=st.replace('data-reveal="1";','');
      const dataAttrs=isAT?` data-effect="${o.effect}" data-speed="${o.speed||1}" data-delay="${o.delay||0}" data-loop="${!!o.loop}" data-text="${o.text.replace(/"/g,'&quot;')}"`:
        hasTxtAnim?` data-reveal="1"`:'';
      return `<div style="${cleanSt}"${dataAttrs}>${exportObjInner(o)}</div>`;
    }).join('');
    return `<section style="${bgSt}">${objs}</section>`;
  }).join('\n');

  const shareBtn=`<div style="padding:24px 0;text-align:center">
  <button onclick="navigator.clipboard&&navigator.clipboard.writeText(location.href).then(()=>this.textContent='✓ 복사됨!',()=>0);this.textContent='링크 복사 중...'" style="background:#B14A3C;color:#fff;border:none;border-radius:999px;padding:12px 28px;font-size:14px;cursor:pointer;font-family:inherit">🔗 링크 복사</button>
</div>`;

  const out=`<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>우리 결혼합니다 💍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="${buildFontLink()}" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e9e6df;display:flex;justify-content:center;min-height:100vh}
.wrap{width:${doc.width}px;max-width:100%;box-shadow:0 0 60px rgba(0,0,0,.1)}
.wrap section{width:${doc.width}px!important;max-width:100%}
${hasAnim?animKFs:''}
</style>
</head>
<body><div class="wrap">${cards}${shareBtn}</div>
${hasAnim?`<script>(${animJS})<\/script>`:''}
${hasSmart?`<script>${smartJS}<\/script>`:''}
</body></html>`;

  const blob=new Blob([out],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='청첩장.html';document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

/* ===== init ===== */
(function(){const l=document.createElement('link');l.rel='stylesheet';l.href=buildFontLink();document.head.appendChild(l);})();
load();
$('undoBtn').disabled=true;
renderCards();
renderInspector();
setStatus(storageOK?'✓ 자동 저장 켜짐':'미리보기에선 저장 꺼짐',!storageOK);
</script>
</body>
</html>
